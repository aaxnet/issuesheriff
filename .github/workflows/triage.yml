name: 🔍 IssueSheriff — Auto Triage

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    name: Triage Issue
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install IssueSheriff
        run: pip install issuesheriff

      - name: Write issue to JSON
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python - <<'EOF'
          import json, os
          issue = {
            "number": int(os.environ["ISSUE_NUMBER"]),
            "title": os.environ["ISSUE_TITLE"],
            "body": os.environ.get("ISSUE_BODY", ""),
            "comments": []
          }
          with open("issue.json", "w") as f:
              json.dump(issue, f)
          EOF

      - name: Analyze issue
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          issuesheriff analyze issue.json --json > result.json
          cat result.json

      - name: Apply labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import json, os, httpx

          result = json.loads(open("result.json").read())
          labels = result.get("labels", [])
          if not labels:
              print("No labels to apply.")
              exit(0)

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          issue = os.environ["ISSUE_NUMBER"]
          url = f"https://api.github.com/repos/{repo}/issues/{issue}/labels"

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
          }
          r = httpx.post(url, json={"labels": labels}, headers=headers)
          print(f"Applied labels {labels}: HTTP {r.status_code}")
          EOF

      - name: Post triage comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import json, os, httpx

          result = json.loads(open("result.json").read())
          summary = result.get("summary", "")
          issue_type = result.get("type", "unknown")
          labels = result.get("labels", [])
          label_str = ", ".join(f"`{l}`" for l in labels) if labels else "_none_"

          body = f"""<!-- issuesheriff -->
          ### 🔍 IssueSheriff Triage

          **Type:** `{issue_type}`  
          **Labels:** {label_str}

          **Summary:**
          > {summary}

          ---
          <sub>Automatically triaged by [IssueSheriff](https://github.com/yourusername/issuesheriff)</sub>
          """

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          issue = os.environ["ISSUE_NUMBER"]
          url = f"https://api.github.com/repos/{repo}/issues/{issue}/comments"

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
          }
          r = httpx.post(url, json={"body": body}, headers=headers)
          print(f"Comment posted: HTTP {r.status_code}")
          EOF
